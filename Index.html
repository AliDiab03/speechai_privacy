<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Speech Notes AI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: #08081C;
    color: #F0F0FF;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── TOP NAV TABS ── */
  nav {
    display: flex;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    background: rgba(8,8,28,0.95);
    backdrop-filter: blur(12px);
    position: sticky; top: 0; z-index: 10;
  }

  nav a {
    text-decoration: none;
    padding: 16px 28px;
    font-size: 14px;
    font-weight: 600;
    color: rgba(240,240,255,0.45);
    border-bottom: 2px solid transparent;
    transition: color .2s, border-color .2s;
    letter-spacing: 0.2px;
  }

  nav a.active {
    color: #fff;
    border-bottom-color: #6B7FFF;
  }

  nav a:hover:not(.active) {
    color: rgba(240,240,255,0.75);
  }

  /* ── MAIN ── */
  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px 24px;
  }

  .card {
    text-align: center;
    max-width: 460px;
    width: 100%;
  }

  .app-icon {
    width: 108px;
    height: 108px;
    border-radius: 28px;
    object-fit: cover;
    margin-bottom: 28px;
    box-shadow: 0 20px 60px rgba(107,127,255,0.3);
  }

  .app-name {
    font-size: 32px;
    font-weight: 800;
    letter-spacing: -0.8px;
    margin-bottom: 14px;
    background: linear-gradient(135deg, #8BA4FF 0%, #B97DFF 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .app-desc {
    font-size: 16px;
    line-height: 1.7;
    color: rgba(240,240,255,0.55);
    margin-bottom: 40px;
    font-weight: 400;
  }

  .play-btn {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    background: #fff;
    color: #111;
    text-decoration: none;
    padding: 14px 28px;
    border-radius: 14px;
    font-weight: 700;
    font-size: 15px;
    transition: transform .15s, box-shadow .15s;
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
  }

  .play-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  .play-btn svg {
    width: 26px; height: 26px; flex-shrink: 0;
  }

  .btn-text-wrap {
    display: flex; flex-direction: column; text-align: left; line-height: 1.2;
  }
  .btn-sub  { font-size: 10px; font-weight: 500; opacity: 0.55; text-transform: uppercase; letter-spacing: 0.5px; }
  .btn-main { font-size: 16px; font-weight: 800; }

  /* ── FOOTER ── */
  footer {
    text-align: center;
    padding: 20px;
    font-size: 12px;
    color: rgba(240,240,255,0.2);
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="active">Home</a>
  <a href="privacy.html">Privacy Policy</a>
</nav>

<main>
  <div class="card">
    <img src="1782325058237_speechly.png" alt="Speech Notes AI" class="app-icon">

    <div class="app-name">Speech Notes AI</div>

    <p class="app-desc">
      Turn your voice into text instantly. Record meetings, lectures, or any conversation and get accurate transcripts in 50+ languages — right on your device.
    </p>

    <a class="play-btn" href="https://play.google.com/store" target="_blank">
      <!-- Google Play icon -->
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M3.18 23.76A1.5 1.5 0 0 0 5.1 24l13.57-7.84-3.1-3.1-12.39 10.7z" fill="#EA4335"/>
        <path d="M22.54 9.55 19.51 7.8l-3.44 3.44 3.44 3.44 3.05-1.76a1.5 1.5 0 0 0 0-2.37z" fill="#FBBC04"/>
        <path d="M5.1 0 18.67 7.84l-3.1 3.1L5.1 0z" fill="#4285F4"/>
        <path d="M.49 1.07A1.5 1.5 0 0 0 0 2.25v19.5a1.5 1.5 0 0 0 .49 1.18l.06.06L11.1 12 .55 1.01l-.06.06z" fill="#34A853"/>
      </svg>
      <div class="btn-text-wrap">
        <span class="btn-sub">Get it on</span>
        <span class="btn-main">Google Play</span>
      </div>
    </a>
  </div>
</main>

<footer>© 2026 Speech Notes AI</footer>

</body>
</html>
